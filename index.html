<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
  <meta
    name="description"
    content="Μονοσέλιδη πρόσκληση για τον γάμο του Γιάννη και της Κατερίνας και την ονοματοδοσία του γιου τους."
  />

  <link
    href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="invitation-page">
    <section class="hero-panel" aria-label="Κεντρική πρόσκληση">
      <div class="marble-overlay"></div>
      <div class="gold-accent gold-accent-top" aria-hidden="true"></div>
      <div class="gold-accent gold-accent-bottom" aria-hidden="true"></div>
      <div class="paper-lines" aria-hidden="true"></div>

      <div class="hero-content">
        <p class="eyebrow">ΓΑΜΟΣ &amp; ΟΝΟΜΑΤΟΔΟΣΙΑ</p>
        <h1 class="hero-title">ΚΑΤΕΡΙΝΑ &amp; ΓΙΑΝΝΗΣ</h1>
        <p class="hero-subtitle">Σας προσκαλούμε με χαρά σε μια βραδιά που θα θέλαμε να μοιραστούμε μαζί σας.</p>
      </div>
    </section>

    <section class="details-panel" aria-label="Στοιχεία εκδήλωσης">
      <div class="details-inner">
        <p class="event-date">Σάββατο, 29 Αυγούστου 2026</p>
        <p class="event-location">Κτήμα Κλεοπάτρα · Κορωπί</p>
        <p class="event-note">Γάμος, ονοματοδοσία και δεξίωση στον ίδιο χώρο</p>

        <div class="button-row">
          <a
            href="https://kateravr-bot.github.io/wedding-site/"
            target="_blank"
            rel="noopener noreferrer"
            class="outline-button"
          >
            RSVP
          </a>

          <a
            href="https://www.ktimakleopatra.gr/ktima/"
            target="_blank"
            rel="noopener noreferrer"
            class="ghost-link"
          >
            Το Κτήμα
          </a>
        </div>

        <div class="meta-row">
          <div class="meta-card">
            <span class="meta-label">Ώρα</span>
            <span class="meta-value">19:00</span>
          </div>
          <div class="meta-card">
            <span class="meta-label">RSVP έως</span>
            <span class="meta-value">20 / 07</span>
          </div>
          <div class="meta-card">
            <span class="meta-label">IBAN</span>
            <span class="meta-value">Θα προστεθεί σύντομα</span>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
