<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
  <meta
    name="description"
    content="Πρόσκληση για τον γάμο της Κατερίνας και του Γιάννη στο Κτήμα Κλεοπάτρα."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=WindSong:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="invitation-stage">
    <section class="invitation-card" aria-label="Προσκλητήριο">
      <img
        src="assets/linear2.png"
        alt="Προσκλητήριο γάμου και ονοματοδοσίας"
        class="invitation-image"
      />

      <a
        class="venue-icon-link"
        href="https://maps.google.com/?q=Κτήμα+Κλεοπάτρα,+Κορωπί"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Άνοιγμα τοποθεσίας Κτήμα Κλεοπάτρα, Κορωπί στους Χάρτες Google"
        title="Κτήμα Κλεοπάτρα, Κορωπί"
      >
        <img src="assets/stigma.png" alt="" class="venue-icon" />
      </a>

      <div class="rsvp-inline" aria-label="RSVP">
        <span class="rsvp-label">Επιβεβαίωση παρουσίας ως 20/07</span>
        <a
          href="https://kateravr-bot.github.io/wedding-site/"
          target="_blank"
          rel="noopener noreferrer"
          class="rsvp-icon-link"
          aria-label="Άνοιγμα σελίδας RSVP"
          title="RSVP"
        >
          <img src="assets/click.png" alt="" class="rsvp-icon" />
        </a>
      </div>
    </section>
  </main>
</body>
</html>
