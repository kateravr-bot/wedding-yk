<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
  <meta
    name="description"
    content="Πρόσκληση για τον γάμο της Κατερίνας και του Γιάννη στο Κτήμα Κλεοπάτρα."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="invitation-stage">
    <section class="invitation-card" aria-label="Προσκλητήριο γάμου και ονοματοδοσίας">
      <img
        src="assets/sunflowers.png"
        alt="Προσκλητήριο Κατερίνα και Γιάννης"
        class="invitation-image"
      />

      <div class="overlay-actions">
        <a
          href="https://kateravr-bot.github.io/wedding-site/"
          target="_blank"
          rel="noopener noreferrer"
          class="rsvp-button"
        >
          RSVP
        </a>

        <p class="gift-note">Προαιρετικό δώρο ΙΒΑΝ:</p>
      </div>

      <a
        class="location-hotspot"
        href="https://maps.google.com/?q=Κτήμα+Κλεοπάτρα,+Κορωπί"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Άνοιγμα τοποθεσίας Κτήμα Κλεοπάτρα, Κορωπί στους Χάρτες Google"
        title="Κτήμα Κλεοπάτρα, Κορωπί"
      ></a>
    </section>
  </main>
</body>
</html>
