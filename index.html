<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
  <meta
    name="description"
    content="Πρόσκληση για τον γάμο της Κατερίνας και του Γιάννη και την ονοματοδοσία του γιου τους στο Κτήμα Κλεοπάτρα."
  />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="invitation-panel" aria-label="Προσκλητήριο γάμου και ονοματοδοσίας">
      <img
        src="assets/sunflowers.png"
        alt="Προσκλητήριο γάμου και ονοματοδοσίας της Κατερίνας και του Γιάννη"
        class="invitation-image"
      />
    </section>

    <section class="actions-panel" aria-label="Πληροφορίες και επιβεβαίωση παρουσίας">
      <div class="actions-inner">
        <p class="event-location">
          <a
            href="https://maps.google.com/?q=Κτήμα+Κλεοπάτρα,+Κορωπί"
            target="_blank"
            rel="noopener noreferrer"
            class="location-link"
            aria-label="Άνοιγμα τοποθεσίας Κτήμα Κλεοπάτρα, Κορωπί στους Χάρτες Google"
          >
            Κτήμα Κλεοπάτρα, Κορωπί
          </a>
        </p>

        <a
          href="https://kateravr-bot.github.io/wedding-site/"
          target="_blank"
          rel="noopener noreferrer"
          class="rsvp-button"
        >
          RSVP
        </a>

        <p class="gift-label">Προαιρετικό δώρο ΙΒΑΝ:</p>
      </div>
    </section>
  </main>
</body>
</html>
