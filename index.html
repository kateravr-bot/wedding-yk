<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
<meta name="description" content="Πρόσκληση για τον γάμο της Κατερίνας και του Γιάννη και την ονοματοδοσία του γιου τους, στο Κτήμα Κλεοπάτρα, Κορωπί." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#fbf9f4;          /* warm paper */
  --card:#ffffff;
  --ink:#1d1d1d;
  --muted:#5a564e;
  --hair:#e3ddd1;        /* hairline rules */
  --gold:#cf9f37;        /* sunflower accent */
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);overflow-x:hidden;}
body{
  font-family:"Manrope",-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
a{color:inherit;text-decoration:none;}

.stage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:clamp(16px,4vw,56px);
}
.invitation{
  position:relative;width:min(100%,1000px);background:var(--card);
  display:grid;grid-template-columns:1.08fr 0.92fr;align-items:stretch;
  border:1px solid #efeada;
  box-shadow:0 28px 70px -38px rgba(80,66,30,.28),0 2px 10px -6px rgba(0,0,0,.06);
  border-radius:3px;overflow:hidden;
}

/* ---- text column ---- */
.text-col{
  padding:clamp(30px,5vw,64px) clamp(22px,4.5vw,56px);
  display:flex;flex-direction:column;align-items:center;text-align:center;
  justify-content:center;gap:clamp(20px,3.4vw,34px);
}
.names{margin:0;color:var(--ink);width:100%;display:flex;justify-content:center;}
.names svg{width:min(94%,440px);height:auto;display:block;}

.intro{
  margin:0;font-weight:300;color:var(--ink);
  font-size:clamp(.96rem,1.15vw,1.12rem);line-height:2;letter-spacing:.015em;
}
.rule{width:min(62%,260px);height:0;border:0;border-top:1px solid var(--hair);margin:2px auto;}

.date{
  margin:0;font-weight:500;text-transform:uppercase;
  font-size:clamp(.92rem,1.08vw,1.04rem);letter-spacing:.2em;line-height:2.1;
}
.date .time{font-weight:400;letter-spacing:.22em;}

.divider{display:flex;align-items:center;justify-content:center;gap:16px;width:min(72%,300px);}
.divider .ln{flex:1;height:0;border-top:1px solid var(--hair);}
.divider img{width:38px;height:auto;display:block;flex:none;filter:saturate(1.02);}

.venue{margin:0;}
.venue a{
  display:inline-block;font-weight:500;text-transform:uppercase;
  font-size:clamp(.9rem,1.06vw,1.02rem);letter-spacing:.2em;
  padding:6px 4px;border-bottom:1px solid transparent;transition:border-color .25s,color .25s;
}
.venue a:hover,.venue a:focus-visible{color:var(--gold);border-bottom-color:var(--gold);outline:none;}

.rsvp{margin:0;font-weight:300;font-size:clamp(.9rem,1.05vw,1.02rem);letter-spacing:.02em;color:var(--muted);}
.rsvp a{font-weight:500;color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:1px;transition:color .25s,border-color .25s;}
.rsvp a:hover,.rsvp a:focus-visible{color:var(--gold);border-bottom-color:var(--gold);outline:none;}

/* ---- floral column ---- */
.floral-col{position:relative;display:flex;align-items:center;justify-content:center;padding:18px 14px;}
.floral-col img{width:100%;height:100%;max-height:760px;object-fit:contain;object-position:center;display:block;}

/* ---- page-load reveal ---- */
@media (prefers-reduced-motion:no-preference){
  .reveal{opacity:0;transform:translateY(14px);animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;}
  .d1{animation-delay:.05s}.d2{animation-delay:.22s}.d3{animation-delay:.36s}
  .d4{animation-delay:.5s}.d5{animation-delay:.62s}.d6{animation-delay:.74s}.d7{animation-delay:.86s}
  .floral-col img{opacity:0;animation:fadein 1.4s ease .15s forwards;}
}
@keyframes rise{to{opacity:1;transform:none;}}
@keyframes fadein{to{opacity:1;}}

/* ---- responsive ---- */
@media (max-width:760px){
  .invitation{grid-template-columns:1fr;}
  .floral-col{position:absolute;inset:0 0 0 auto;width:74%;padding:0;opacity:.16;pointer-events:none;z-index:0;}
  .floral-col img{height:100%;max-height:none;object-fit:cover;object-position:right top;}
  .text-col{position:relative;z-index:1;padding:clamp(34px,9vw,52px) clamp(22px,7vw,40px);}
}
</style>
