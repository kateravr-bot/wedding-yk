<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατερίνα &amp; Γιάννης | Γάμος &amp; Ονοματοδοσία</title>
  <meta
    name="description"
    content="Πρόσκληση για τον γάμο της Κατερίνας και του Γιάννη στο Κτήμα Κλεοπάτρα."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=WindSong:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/style.css" />

  <style>
    .invitation-card {
      position: relative;
      display: inline-block;
      width: min(100%, 1024px);
      max-width: 100%;
      line-height: 0;
    }

    .invitation-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .venue-text-link,
    .rsvp-text-link {
      position: absolute;
      display: block;
      z-index: 5;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
      line-height: normal;
      border-radius: 6px;
    }

    /* Περιοχή: ΚΤΗΜΑ ΚΛΕΟΠΑΤΡΑ, ΚΟΡΩΠΙ */
    .venue-text-link {
      left: 11.5%;
      top: 67.9%;
      width: 40.5%;
      height: 4.2%;
    }

    /* Περιοχή: Επιβεβαίωση παρουσίας εδώ ως 27/07. */
    .rsvp-text-link {
      left: 10.5%;
      top: 78.3%;
      width: 43.5%;
      height: 4.0%;
    }

    .venue-text-link:hover,
    .rsvp-text-link:hover {
      background: rgba(0, 0, 0, 0.025);
    }

    .venue-text-link:focus-visible,
    .rsvp-text-link:focus-visible {
      outline: 2px solid rgba(0, 0, 0, 0.45);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="invitation-stage">
    <section class="invitation-card" aria-label="Προσκλητήριο">
      <img
        src="assets/finale_v5.png"
        alt="Προσκλητήριο γάμου και ονοματοδοσίας"
        class="invitation-image"
      />

      <a
        class="venue-text-link"
        href="https://maps.app.goo.gl/83N2TdXBCzwDKf6F9"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Άνοιγμα τοποθεσίας Κτήμα Κλεοπάτρα, Κορωπί στους Χάρτες Google"
        title="Κτήμα Κλεοπάτρα, Κορωπί"
      ></a>

      <a
        class="rsvp-text-link"
        href="https://kateravr-bot.github.io/wedding-site/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Επιβεβαίωση παρουσίας έως 27/07"
        title="Επιβεβαίωση παρουσίας"
      ></a>
    </section>
  </main>
</body>
</html>
